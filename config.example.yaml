# ============ 飞书做价差通知机器人 · 配置模板 ============
# 复制为 config.yaml 后按需修改：cp config.example.yaml config.yaml

# 飞书自定义机器人 webhook（群设置 → 群机器人 → 添加机器人 → 自定义机器人）
webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/你的机器人ID"

# 若机器人开启了「加签」安全设置，填入密钥；否则留空
feishu_secret: ""

# 行情数据源：tencent（默认，字段全）| sina（备用）。主源失败会自动回退
data_source: "tencent"

# loop 常驻模式的轮询间隔（秒）。震荡做价差一般 30~60s 足够
poll_interval_seconds: 60

# 是否仅在 A股交易时段（09:30-11:30 / 13:00-15:00 工作日）运行
only_trading_hours: true

# 运行状态文件（记录网格档位，避免重复推送）。相对路径相对本配置文件解析
state_file: "state.json"

# ------------------- 监控标的 -------------------
# 每只股票一组配置。字段说明：
#   code           必填，6 位代码（沪/深/北自动识别）
#   name           可选，留空自动取行情名称
#   cost           可选，持仓成本，仅用于展示「距成本/浮亏」
#   base_price     网格基准价。显式填写=立即按此锚点评估；留空=以昨收自动锚定（首次只记录不触发）
#   grid_step_pct  每格价差百分比，越小越灵敏、信号越多
#   trade_shares   每格建议交易股数（A股 100 股 = 1 手）
#   upper_limit_pct 网格上限（相对基准价 %），超出停止高抛（留空不限制）
#   lower_limit_pct 网格下限（相对基准价 %），触及停止低吸（留空不限制）
#   trend_alert_grids 连续同向 N 格触发「单边行情」预警，默认 3
#   strategy       策略类型：grid（默认网格）| confluence（回撤+趋势线+支阻互换+VWAP 共振）
#   confluence_min_score 共振策略至少满足几项条件才触发，默认 4（满分 6）
# 共振策略默认参数：四项方向（回撤/趋势线/支阻互换/VWAP）+ 波动 + 背离，满分 6，至少满足 4 项提醒
confluence_defaults: &confluence_defaults
  cost: null
  base_price: null
  grid_step_pct: 3.0
  trade_shares: 100
  upper_limit_pct: 30
  lower_limit_pct: -30
  trend_alert_grids: 3
  strategy: "confluence"
  confluence_lookback: 120       # 最近 120 个分时点画线/找支阻
  confluence_min_bars: 30        # 分时点不足则跳过
  confluence_min_score: 4        # 4项方向+波动+背离 至少满足 4 项（满分 6）
  confluence_cooldown_minutes: 30
  retracement_min_pct: 38.2      # 回撤/反抽区间
  retracement_max_pct: 61.8
  trendline_tolerance_pct: 1.0   # 趋势线附近容忍偏差
  sr_tolerance_pct: 1.0          # 支阻位附近容忍偏差
  vwap_tolerance_pct: 0.5        # VWAP 附近容忍偏差
  # --- K线 / 历史存储 ---
  kline_lookback: 320            # 拉取/参考的 1 分钟 K 线根数
  # --- 波动率 ---
  enable_volatility: true
  vol_atr_period: 14
  vol_bb_period: 20
  vol_bb_std: 2.0
  vol_hv_period: 60
  vol_high_bb_width_pct: 1.5     # 布林带宽 ≥ 此 → 高波动（加分）；按板块调
  vol_low_bb_width_pct: 0.5      # 布林带宽 ≤ 此 → 低波动，抬高触发门槛（降噪）
  vol_denoise_score_bump: 1
  # --- 背离 ---
  enable_divergence: true
  enable_rsi_divergence: true
  enable_pv_divergence: true
  divergence_rsi_period: 14
  divergence_lookback: 120
  divergence_pivot_window: 3
  divergence_min_swing_pct: 0.3  # 波幅小于此 % 的 HH/LL 视为噪音
  divergence_suppress_opposite: true  # 顶背离压制低吸 / 底背离压制高抛

stocks:
  - <<: *confluence_defaults
    code: "301120"
    name: ""

  - <<: *confluence_defaults
    code: "300450"
    name: ""

  - <<: *confluence_defaults
    code: "300660"
    name: ""

  - <<: *confluence_defaults
    code: "301408"
    name: ""

  - <<: *confluence_defaults
    code: "301191"
    name: ""
